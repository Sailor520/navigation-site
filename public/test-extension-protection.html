<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扩展错误保护测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            line-height: 1.6;
        }
        .test-button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
        .test-button:hover {
            background: #0056b3;
        }
        .result {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            padding: 15px;
            margin: 10px 0;
        }
        .success {
            background: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }
    </style>
</head>
<body>
    <h1>🔒 浏览器扩展错误保护测试</h1>
    
    <p>这个页面用于测试我们的扩展错误保护机制是否正常工作。</p>
    
    <div class="test-section">
        <h2>测试用例</h2>
        
        <button class="test-button" onclick="testUndefinedJSON()">
            测试 undefined JSON 错误
        </button>
        
        <button class="test-button" onclick="testNullJSON()">
            测试 null JSON 错误
        </button>
        
        <button class="test-button" onclick="testValidJSON()">
            测试正常 JSON 解析
        </button>
        
        <button class="test-button" onclick="simulateExtensionError()">
            模拟扩展错误
        </button>
        
        <button class="test-button" onclick="clearResults()">
            清除结果
        </button>
    </div>
    
    <div id="results"></div>
    
    <div class="instructions">
        <h2>📋 使用说明</h2>
        <ol>
            <li>打开浏览器开发者工具（F12）</li>
            <li>查看Console标签页</li>
            <li>点击上面的测试按钮</li>
            <li>观察控制台输出和页面上的结果</li>
        </ol>
        
        <h3>预期结果：</h3>
        <ul>
            <li>✅ undefined/null JSON错误应该被自动拦截</li>
            <li>✅ 控制台显示保护日志</li>
            <li>✅ 页面不会崩溃或显示错误对话框</li>
            <li>✅ 正常JSON解析应该继续工作</li>
        </ul>
    </div>

    <script>
        function addResult(type, message) {
            const results = document.getElementById('results');
            const div = document.createElement('div');
            div.className = `result ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${message}`;
            results.appendChild(div);
        }

        function testUndefinedJSON() {
            try {
                console.log('🧪 测试 undefined JSON...');
                const result = JSON.parse(undefined);
                addResult('success', 'undefined JSON 被安全处理，返回值: ' + JSON.stringify(result));
            } catch (error) {
                addResult('error', 'undefined JSON 处理失败: ' + error.message);
            }
        }

        function testNullJSON() {
            try {
                console.log('🧪 测试 null JSON...');
                const result = JSON.parse(null);
                addResult('success', 'null JSON 被安全处理，返回值: ' + JSON.stringify(result));
            } catch (error) {
                addResult('error', 'null JSON 处理失败: ' + error.message);
            }
        }

        function testValidJSON() {
            try {
                console.log('🧪 测试正常 JSON...');
                const result = JSON.parse('{"test": "value"}');
                addResult('success', '正常 JSON 解析成功: ' + JSON.stringify(result));
            } catch (error) {
                addResult('error', '正常 JSON 解析失败: ' + error.message);
            }
        }

        function simulateExtensionError() {
            console.log('🧪 模拟扩展错误...');
            // 模拟一个类似扩展的错误
            setTimeout(() => {
                const error = new Error('"undefined" is not valid JSON');
                error.stack = 'Error: "undefined" is not valid JSON\n    at chrome-extension://test/frame_ant.js:123:45';
                throw error;
            }, 100);
            addResult('success', '扩展错误已模拟，请查看控制台');
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        // 监听错误事件
        window.addEventListener('error', function(event) {
            console.log('📊 错误事件被捕获:', {
                message: event.message,
                filename: event.filename,
                lineno: event.lineno,
                colno: event.colno
            });
        });

        // 初始化消息
        addResult('success', '错误保护测试页面已加载，开始测试...');
    </script>
</body>
</html>
